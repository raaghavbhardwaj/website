baseURL: 'https://raaghavbhardwaj.me/'
languageCode: 'en-us'
title: 'Raaghav Bhardwaj'

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

permalinks:
  posts: "/:slug/"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

menu:
  main:
    - identifier: wiki
      name: Wiki
      url: /wiki/
      weight: 10
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

params:
  math: false
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true

  homeInfoParams:
    Title: Hey there, welcome! 👋
    Content: Explore a bit — you’ll find cool info, handy links, and a few things about me here.

  socialIcons: # optional
    - name: linkedin
      url: https://www.linkedin.com/in/raaghavbhardwaj/
    - name: x
      url: https://x.com/RaaghavBhardwaj

  fuseOpts:
    ignoreLocation: true
    keys: ["title", "permalink", "summary", "content"]

